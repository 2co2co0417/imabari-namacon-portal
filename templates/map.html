{% extends "base_private.html" %}
{% block title %}現場地図を送る｜取引先専用{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<div class="card">
  <div class="card-h">
    <h1 class="hero-title">現場地図を送る</h1>
  </div>

  <div class="card-b" style="max-width: 880px; margin: 0 auto;">
    <form method="post" class="form" id="mapForm">

      <div class="muted" style="margin-bottom:14px;">
        「現在地を取得」、または、地図をタップして位置を指定してください。
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;">
        <button type="button" class="btn-primary btn-map-action" id="btnGetLocation">現在地を取得</button>
        <button type="submit" class="btn-primary btn-map-action" id="btnSubmit">送　信</button>
        <a class="btn-ghost" href="{{ url_for('dashboard') }}">戻る</a>
      </div>

      <div id="mapStatus" class="muted" style="margin-bottom:12px;">
        まだ位置情報は設定していません。
      </div>

      <div
        id="map"
        style="
          height:420px;
          border:1px solid #d8e0e6;
          border-radius:14px;
          margin-bottom:16px;
          display:none;
          overflow:hidden;
        ">
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
        <div>
          <label class="label">緯度</label>
          <input class="input" type="text" name="lat" id="lat" placeholder="自動入力されます">
        </div>
        <div>
          <label class="label">経度</label>
          <input class="input" type="text" name="lng" id="lng" placeholder="自動入力されます">
        </div>
      </div>

      <input type="hidden" name="map_url" id="map_url">
      <input type="hidden" name="location_method" id="location_method" value="manual">

      <label class="label">コメント（任意）</label>
      <textarea
        class="textarea"
        name="comment"
        rows="4"
        placeholder="現場名、進入路の注意、集合場所など"></textarea>

      <div class="muted" style="margin-top:12px;">
        ※ログイン中の会社名・担当者名とあわせて送信されます。<br>
        ※地図をタップ、またはピンを動かすと位置を変更できます。
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  const btnGetLocation = document.getElementById("btnGetLocation");
  const mapElement = document.getElementById("map");
  const mapStatus = document.getElementById("mapStatus");
  const latInput = document.getElementById("lat");
  const lngInput = document.getElementById("lng");
  const mapUrlInput = document.getElementById("map_url");
  const locationMethodInput = document.getElementById("location_method");
  const mapForm = document.getElementById("mapForm");

  let map;
  let marker;

  // 初期表示位置：今治市付近
  const defaultLat = 34.066;
  const defaultLng = 132.997;

  function isValidCoordinate(lat, lng) {
    const latNum = parseFloat(lat);
    const lngNum = parseFloat(lng);

    if (Number.isNaN(latNum) || Number.isNaN(lngNum)) return false;
    if (latNum < -90 || latNum > 90) return false;
    if (lngNum < -180 || lngNum > 180) return false;

    return true;
  }

  function updateHiddenMapUrl(lat, lng) {
    mapUrlInput.value = `https://www.google.com/maps?q=${lat},${lng}`;
  }

  function setPosition(lat, lng, methodLabel, methodValue) {
    const latFixed = Number(lat).toFixed(6);
    const lngFixed = Number(lng).toFixed(6);

    latInput.value = latFixed;
    lngInput.value = lngFixed;
    locationMethodInput.value = methodValue;
    updateHiddenMapUrl(latFixed, lngFixed);

    mapElement.style.display = "block";

    if (!map) {
      map = L.map("map").setView([latFixed, lngFixed], 16);

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      marker = L.marker([latFixed, lngFixed], {
        draggable: true
      }).addTo(map);

      map.on("click", function (e) {
        setPosition(
          e.latlng.lat,
          e.latlng.lng,
          "地図上で位置を指定しました",
          "map"
        );
      });

      marker.on("dragend", function () {
        const pos = marker.getLatLng();
        setPosition(
          pos.lat,
          pos.lng,
          "ピンを移動しました",
          "map"
        );
      });

      setTimeout(function () {
        map.invalidateSize();
      }, 100);

    } else {
      map.setView([latFixed, lngFixed], 16);
      marker.setLatLng([latFixed, lngFixed]);
    }

    mapStatus.textContent = `${methodLabel}（緯度 ${latFixed} / 経度 ${lngFixed}）`;
  }

  function showDefaultMap() {
    mapElement.style.display = "block";

    if (!map) {
      map = L.map("map").setView([defaultLat, defaultLng], 13);

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      marker = L.marker([defaultLat, defaultLng], {
        draggable: true
      }).addTo(map);

      map.on("click", function (e) {
        setPosition(
          e.latlng.lat,
          e.latlng.lng,
          "地図上で位置を指定しました",
          "map"
        );
      });

      marker.on("dragend", function () {
        const pos = marker.getLatLng();
        setPosition(
          pos.lat,
          pos.lng,
          "ピンを移動しました",
          "map"
        );
      });

      setTimeout(function () {
        map.invalidateSize();
      }, 100);
    }

    mapStatus.textContent = "現場にいない場合は、地図をタップして位置を指定してください。";
  }

  btnGetLocation.addEventListener("click", function () {
    if (!navigator.geolocation) {
      mapStatus.textContent = "この端末では位置情報が使えません。";
      return;
    }

    mapStatus.textContent = "位置情報を取得しています…";

    navigator.geolocation.getCurrentPosition(
      function (position) {
        setPosition(
          position.coords.latitude,
          position.coords.longitude,
          "現在地を取得しました",
          "current"
        );
      },
      function (error) {
        if (error.code === 1) {
          mapStatus.textContent =
            "位置情報がOFFです。設定 → プライバシー → 位置情報サービスをONにしてください。地図をタップして指定することもできます。";
          showDefaultMap();
        } else if (error.code === 2) {
          mapStatus.textContent = "位置情報を取得できません。地図をタップして指定してください。";
          showDefaultMap();
        } else if (error.code === 3) {
          mapStatus.textContent = "取得に時間がかかっています。地図をタップして指定することもできます。";
          showDefaultMap();
        } else {
          mapStatus.textContent = "位置情報の取得に失敗しました。地図をタップして指定してください。";
          showDefaultMap();
        }
      },
      {
        enableHighAccuracy: true,
        timeout: 20000,
        maximumAge: 60000
      }
    );
  });

  mapForm.addEventListener("submit", function (e) {
    const lat = latInput.value.trim();
    const lng = lngInput.value.trim();

    if (!isValidCoordinate(lat, lng)) {
      e.preventDefault();
      mapStatus.textContent = "送信前に、現在地を取得するか地図上で位置を指定してください。";
      showDefaultMap();
      return;
    }

    updateHiddenMapUrl(lat, lng);
  });

  showDefaultMap();
})();
</script>
{% endblock %}
