{% extends "base_private.html" %}
{% block title %}現場地図を送る｜取引先専用{% endblock %}

{% block content %}
<div class="card">
  <div class="card-h">
    <h1 class="hero-title">現場地図を送る</h1>
  </div>

  <div class="card-b" style="max-width: 880px; margin: 0 auto;">
    <form method="post" class="form" id="mapForm">
      <div class="muted" style="margin-bottom:14px;">
        現在地を取得して、その位置情報とコメントを送信できます。
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;">
        <button type="button" class="btn-primary" id="btnGetLocation">現在地を取得</button>
        <button type="button" class="btn-ghost" id="btnOpenGoogle" disabled>Googleマップで開く</button>
      </div>

      <div id="mapStatus" class="muted" style="margin-bottom:12px;">
        まだ位置情報は取得していません。
      </div>

      <div id="mapPreviewBox" style="display:none; margin-bottom:16px;">
        <iframe
          id="mapFrame"
          title="現場地図"
          src=""
          style="width:100%; height:420px; border:1px solid #d8e0e6; border-radius:14px; background:#fff;"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
        <div>
          <label class="label">緯度</label>
          <input class="input" type="text" name="lat" id="lat" readonly placeholder="未取得">
        </div>
        <div>
          <label class="label">経度</label>
          <input class="input" type="text" name="lng" id="lng" readonly placeholder="未取得">
        </div>
      </div>

      <input type="hidden" name="map_url" id="map_url">

      <label class="label">コメント（任意）</label>
      <textarea
        class="textarea"
        name="comment"
        rows="4"
        placeholder="現場名、進入路の注意、集合場所など"></textarea>

      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="submit" class="btn-primary">送信する</button>
        <a class="btn-ghost" href="{{ url_for('dashboard') }}">戻る</a>
      </div>

      <div class="muted" style="margin-top:12px;">
        ※ログイン中の会社名・担当者名とあわせて送信されます。
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  const btnGetLocation = document.getElementById("btnGetLocation");
  const btnOpenGoogle = document.getElementById("btnOpenGoogle");
  const mapFrame = document.getElementById("mapFrame");
  const mapPreviewBox = document.getElementById("mapPreviewBox");
  const mapStatus = document.getElementById("mapStatus");
  const latInput = document.getElementById("lat");
  const lngInput = document.getElementById("lng");
  const mapUrlInput = document.getElementById("map_url");

  let currentMapUrl = "";

  btnGetLocation.addEventListener("click", function () {
    if (!navigator.geolocation) {
      mapStatus.textContent = "この端末では位置情報が使えません。";
      return;
    }

    mapStatus.textContent = "位置情報を取得しています…";

    navigator.geolocation.getCurrentPosition(
      function (position) {
        const lat = position.coords.latitude.toFixed(6);
        const lng = position.coords.longitude.toFixed(6);

        const googleUrl = `https://www.google.com/maps?q=${lat},${lng}`;
        const embedUrl = `https://www.google.com/maps?q=${lat},${lng}&output=embed`;

        latInput.value = lat;
        lngInput.value = lng;
        mapUrlInput.value = googleUrl;
        currentMapUrl = googleUrl;

        mapFrame.src = embedUrl;
        mapPreviewBox.style.display = "block";
        btnOpenGoogle.disabled = false;

        mapStatus.textContent = `位置を取得しました（緯度 ${lat} / 経度 ${lng}）`;
      },
      function (error) {
        if (error.code === 1) {
          mapStatus.textContent = "位置情報の利用が許可されていません。";
        } else if (error.code === 2) {
          mapStatus.textContent = "現在地を取得できませんでした。";
        } else if (error.code === 3) {
          mapStatus.textContent = "位置情報の取得がタイムアウトしました。";
        } else {
          mapStatus.textContent = "位置情報の取得に失敗しました。";
        }
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  });

  btnOpenGoogle.addEventListener("click", function () {
    if (currentMapUrl) {
      window.open(currentMapUrl, "_blank");
    }
  });
})();
</script>
{% endblock %}
